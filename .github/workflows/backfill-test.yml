name: Backfill Test (10 articles)
on: workflow_dispatch
permissions:
  contents: write
  models: read
jobs:
  backfill-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Create backfill script
        run: |
          cat > backfill_test.py << 'PYEOF'
          import sqlite3, json, time, os, sys, re
          sys.path.insert(0, 'scraper')
          from scraper_cohere import _enrich_with_ai

          conn = sqlite3.connect('data/aura.db')
          conn.row_factory = sqlite3.Row

          # Pick only 10 neutral articles
          rows = conn.execute(
              "SELECT id, title, summary FROM articles WHERE sentiment = 'neutral' OR sentiment IS NULL LIMIT 10"
          ).fetchall()

          print(f"Testing backfill on {len(rows)} articles...")
          success = 0
          for i, row in enumerate(rows):
              title = row["title"] or ""
              summary = row["summary"] or ""
              print(f"  [{i+1}/{len(rows)}] {title[:60]}")
              try:
                  enrichment = _enrich_with_ai(title, summary)
                  conn.execute(
                      "UPDATE articles SET title_en=?, category=?, sentiment=?, entities=? WHERE id=?",
                      (enrichment["title_en"], enrichment["category"],
                       enrichment["sentiment"], json.dumps(enrichment["entities"]), row["id"])
                  )
                  conn.commit()
                  print(f"    → sentiment: {enrichment['sentiment']} | title_en: {enrichment['title_en'][:50]}")
                  success += 1
              except Exception as e:
                  print(f"    → FAILED: {e}")
              # Throttle: GitHub Models 15 req/min hard limit
              if i < len(rows) - 1:
                  time.sleep(5)

          # Export updated JSON
          conn2 = sqlite3.connect('data/aura.db')
          conn2.row_factory = sqlite3.Row
          all_rows = conn2.execute('SELECT * FROM articles ORDER BY published_at DESC').fetchall()
          records = []
          for r in all_rows:
              records.append({
                  'id': r['id'], 'url': r['url'], 'title': r['title'],
                  'title_en': r['title_en'] or r['title'], 'summary': r['summary'],
                  'source': r['source'], 'category': r['category'],
                  'sentiment': r['sentiment'] or 'neutral',
                  'entities': json.loads(r['entities']) if r['entities'] else [],
                  'breaking': 1, 'timestamp': r['published_at'],
                  'location': {'name': r['loc_name'], 'lat': r['lat'], 'lng': r['lng']}
              })
          with open('data/data.json', 'w') as f:
              json.dump(records, f, ensure_ascii=False, indent=2)
          print(f"Exported {len(records)} records to data/data.json. Backfill test: {success}/{len(rows)} enriched.")
          conn.close()
          conn2.close()
          PYEOF
      - name: Run backfill test
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: python3 backfill_test.py
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Backfill test: 10 articles enriched"
          git pull --rebase origin main
          git push origin main
