name: Update News Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  models: read
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run Cohere AI scraper
        run: python scraper/scraper_cohere.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      
      - name: Run multisource scraper
        timeout-minutes: 5
        run: python scraper/scraper_multisource.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        continue-on-error: true


      - name: Run Telegram scraper
        if: false
        run: python scraper/scraper_telegram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        continue-on-error: true

      - name: Safety-net export (always exports latest data.json)
        run: |
          python3 -c "
          import sqlite3, json
          conn = sqlite3.connect('data/aura.db')
          conn.row_factory = sqlite3.Row
          rows = conn.execute('SELECT * FROM articles ORDER BY published_at DESC').fetchall()
          records = []
          for r in rows:
              records.append({
                  'id': r['id'], 'url': r['url'], 'title': r['title'],
                  'title_en': r['title_en'] or r['title'], 'summary': r['summary'],
                  'source': r['source'], 'category': r['category'],
                  'sentiment': r['sentiment'] or 'neutral',
                  'entities': json.loads(r['entities']) if r['entities'] else [],
                  'breaking': 1, 'timestamp': r['published_at'],
                  'location': {'name': r['loc_name'], 'lat': r['lat'], 'lng': r['lng']}
              })
          with open('data/data.json', 'w') as f:
              json.dump(records, f, ensure_ascii=False, indent=2)
          print(f'Safety-net exported {len(records)} records')
          conn.close()
          "
        continue-on-error: true
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update news data"
          for i in 1 2 3; do
            git fetch origin main
            git checkout --ours data/aura.db data/data.json 2>/dev/null || true
            git add data/ 2>/dev/null || true
            GIT_EDITOR=true git rebase --continue 2>/dev/null || true
            git push origin HEAD:main --force-with-lease && break
            echo "Push attempt $i failed, retrying in 10s..."
            git rebase --abort 2>/dev/null || true
            sleep 10
          done
