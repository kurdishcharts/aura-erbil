name: Update News Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  models: read
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run Cohere AI scraper
        run: python scraper/scraper_cohere.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      
      - name: Run multisource scraper
        timeout-minutes: 5
        run: python scraper/scraper_multisource.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        continue-on-error: true

      - name: Run multisource scraper
        timeout-minutes: 5
        run: python scraper/scraper_multisource.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        continue-on-error: true

      - name: Run Telegram scraper
        if: false
        run: python scraper/scraper_telegram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update news data"
          git pull --rebase origin main
          git push
