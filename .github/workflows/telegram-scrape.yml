name: Telegram Scraper (Manual)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run Telegram scraper (inline)
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python -c "
          import hashlib, json, os, random, re, sqlite3, sys, time
          from datetime import datetime, timezone, timedelta
          from urllib import robotparser
          from urllib.parse import urljoin

          import requests
          from bs4 import BeautifulSoup

          # Put scraper_cohere in path
          sys.path.insert(0, 'scraper')
          from scraper_cohere import _enrich_with_ai

          TELEGRAM_CHANNELS = ['rudawenglish', 'AvaNews']
          USER_AGENT        = 'RSSReader/2.0'
          DB_PATH           = 'data/aura.db'
          JSON_EXPORT       = 'data/data.json'
          MIN_DELAY         = 2.0
          MAX_DELAY         = 5.0

          def _connect():
              conn = sqlite3.connect(DB_PATH)
              conn.row_factory = sqlite3.Row
              return conn

          def _make_id(url):
              return hashlib.sha256(url.encode()).hexdigest()[:16]

          def _now_iso():
              return datetime.now(timezone.utc).isoformat()

          session = requests.Session()
          session.headers.update({'User-Agent': USER_AGENT})

          _rp = robotparser.RobotFileParser()
          _rp.set_url('https://t.me/robots.txt')
          try:
              _rp.read()
          except Exception:
              pass

          def _allowed(url):
              return _rp.can_fetch(USER_AGENT, url)

          def _fetch(url, delay=True):
              if not _allowed(url):
                  print(f'  [robots.txt] blocked: {url}')
                  return None
              try:
                  if delay:
                      time.sleep(random.uniform(MIN_DELAY, MAX_DELAY))
                  r = session.get(url, timeout=15)
                  if r.status_code == 200:
                      return r.text
                  print(f'  [warn] HTTP {r.status_code} for {url}')
                  return None
              except Exception as e:
                  print(f'  [error] {e}')
                  return None

          def _parse_channel(html, channel_name):
              soup = BeautifulSoup(html, 'lxml')
              posts = []
              for msg in soup.select('.tgme_widget_message_wrap'):
                  text_div = msg.select_one('.tgme_widget_message_text')
                  if not text_div:
                      continue
                  text = text_div.get_text('\n', strip=True)
                  if len(text) < 20:
                      continue
                  time_tag = msg.select_one('time.datetime')
                  pub = time_tag['datetime'] if time_tag and time_tag.has_attr('datetime') else _now_iso()
                  link_tag = msg.select_one('a.tgme_widget_message_date')
                  url = link_tag['href'] if link_tag and link_tag.has_attr('href') else f'https://t.me/s/{channel_name}/{pub}'
                  posts.append({'text': text, 'published_at': pub, 'url': url})
              return posts

          def _enrich_and_save(posts, channel_name):
              conn = _connect()
              added = 0
              for post in posts:
                  title = post['text'].split('\n')[0][:150]
                  summary = post['text'][:500]
                  enrichment = _enrich_with_ai(title, summary)
                  item = {
                      'id': _make_id(post['url']),
                      'url': post['url'],
                      'title': title,
                      'title_en': enrichment['title_en'],
                      'summary': summary,
                      'source': 'telegram',
                      'category': enrichment['category'],
                      'loc_name': enrichment['loc_name'],
                      'lat': enrichment['lat'],
                      'lng': enrichment['lng'],
                      'published_at': post['published_at'],
                      'fetched_at': _now_iso(),
                      'breaking': 1,
                      'sentiment': enrichment.get('sentiment', 'neutral'),
                      'entities': json.dumps(enrichment.get('entities', []))
                  }
                  conn.execute('''
                      INSERT INTO articles (id,url,title,title_en,summary,source,category,
                          loc_name,lat,lng,published_at,fetched_at,breaking,
                          sentiment,entities)
                      VALUES (:id,:url,:title,:title_en,:summary,:source,:category,
                          :loc_name,:lat,:lng,:published_at,:fetched_at,:breaking,
                          :sentiment,:entities)
                      ON CONFLICT(url) DO UPDATE SET
                          title=excluded.title, title_en=excluded.title_en,
                          summary=excluded.summary, category=excluded.category,
                          loc_name=excluded.loc_name, lat=excluded.lat, lng=excluded.lng,
                          published_at=excluded.published_at, fetched_at=excluded.fetched_at,
                          sentiment=excluded.sentiment, entities=excluded.entities
                  ''', item)
                  conn.commit()
                  added += 1
                  print(f'  [saved] {title[:70]}')
                  if added % 3 == 0:
                      time.sleep(1)
              conn.close()
              return added

          def _export_json(conn):
              rows = conn.execute('SELECT * FROM articles ORDER BY published_at DESC').fetchall()
              records = []
              for r in rows:
                  records.append({
                      'id': r['id'], 'url': r['url'], 'title': r['title'],
                      'title_en': r['title_en'] or r['title'], 'summary': r['summary'],
                      'source': r['source'], 'category': r['category'],
                      'sentiment': r['sentiment'] or 'neutral',
                      'entities': json.loads(r['entities']) if r['entities'] else [],
                      'breaking': 1,
                      'timestamp': r['published_at'],
                      'location': {'name': r['loc_name'], 'lat': r['lat'], 'lng': r['lng']}
                  })
              with open(JSON_EXPORT, 'w', encoding='utf-8') as f:
                  json.dump(records, f, ensure_ascii=False, indent=2)
              print(f'  Exported {len(records)} records -> {JSON_EXPORT}')

          print('=== Aura-Erbil Telegram Scraper ===')
          conn = _connect()
          total = 0
          for channel in TELEGRAM_CHANNELS:
              print(f'-> Channel: @{channel}')
              html = _fetch(f'https://t.me/s/{channel}')
              if not html:
                  continue
              posts = _parse_channel(html, channel)
              print(f'  Found {len(posts)} posts')
              added = _enrich_and_save(posts, channel)
              total += added
          _export_json(conn)
          conn.close()
          print(f'=== Done ({total} new articles) ===')
          "
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Telegram scrape update"
          git push origin main
