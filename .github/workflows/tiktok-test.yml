name: TikTok oEmbed test (one-time)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test TikTok accounts
        run: |
          python3 << 'PYEOF'
          import requests

          accounts = [
              "rudaw.official", "channel8corp", "nrttvofficial", "964.kurdi",
              "vartvnet", "paytextmedia", "kurdistan24", "avamediatv"
          ]
          for acc in accounts:
              try:
                  r = requests.get(
                      f"https://www.tiktok.com/oembed?url=https://www.tiktok.com/@{acc}",
                      timeout=10
                  )
                  if r.status_code == 200:
                      print(f"OK  @{acc}")
                  else:
                      print(f"FAIL @{acc}  (HTTP {r.status_code})")
              except Exception as e:
                  print(f"FAIL @{acc}  ({e})")
          PYEOF
