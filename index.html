<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f0f0f0;color:#111;padding:12px}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.stat-item{background:#fff;padding:6px 12px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.05);font-size:13px}
.stat-item strong{font-size:18px;font-weight:600}
#quant-panel{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.quant-card{background:#fff;padding:8px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
canvas{width:100%!important;height:auto!important}
</style>
</head>
<body>
<div class="stats" id="stats-row"></div>
<div id="quant-panel"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="charts_quant.js"></script>
<script>
let D = [], lastHash = '';

async function fetchData() {
  try {
    const res = await fetch('data/data.json?t='+Date.now());
    const text = await res.text();
    if (text === lastHash) return false;
    lastHash = text;
    D = JSON.parse(text);
    return true;
  } catch(e) { return false; }
}

function renderStats() {
  const total = D.length,
        pos = D.filter(a=>a.sentiment==='positive').length,
        neg = D.filter(a=>a.sentiment==='negative').length,
        neu = D.filter(a=>a.sentiment==='neutral').length,
        score = total ? Math.round(50 + (pos - neg)/total*50) : 50;
  document.getElementById('stats-row').innerHTML =
    `<div class="stat-item">Total <strong>${total}</strong></div>` +
    `<div class="stat-item">Positive <strong style="color:#16a34a">${pos}</strong></div>` +
    `<div class="stat-item">Negative <strong style="color:#dc2626">${neg}</strong></div>` +
    `<div class="stat-item">Neutral <strong style="color:#d97706">${neu}</strong></div>` +
    `<div class="stat-item">Sentiment <strong style="color:${score>=60?'#16a34a':score<=40?'#dc2626':'#d97706'}">${score}</strong></div>`;
}

function rebuildQuant() {
  const panel = document.getElementById('quant-panel');
  panel.innerHTML = '';
  if (typeof buildAnalytics === 'function') {
    buildAnalytics();
  } else {
    panel.innerHTML = '<p>Analytics module not loaded.</p>';
  }
}

async function init() {
  await fetchData();
  renderStats();
  rebuildQuant();
}

setInterval(async () => {
  const changed = await fetchData();
  if (!changed) return;
  renderStats();
  rebuildQuant();
}, 5000);

init();
</script>
</body>
</html>
